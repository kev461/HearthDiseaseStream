<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}HeartDisease Stream{% endblock %}</title>
    <meta name="description" content="Pipeline de predicción de enfermedades cardíacas en tiempo real con PySpark, Kafka y MongoDB Atlas.">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Space+Mono&display=swap" rel="stylesheet">
    <!-- CSS propio -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>

    <!-- Navbar Onyx Glass -->
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="{{ url_for('index') }}">
                <i class="bi bi-heart-pulse-fill me-2"></i>
                Heart<span>Disease</span>&thinsp;Stream
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu"
                style="border-color: var(--border); filter: invert(1);">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto gap-2">
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}"
                           href="{{ url_for('index') }}">
                            <i class="bi bi-house-door"></i> Inicio
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'vista_pacientes' %}active{% endif %}"
                           href="{{ url_for('vista_pacientes') }}">
                            <i class="bi bi-person-lines-fill"></i> Pacientes
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.endpoint == 'vista_stats' %}active{% endif %}"
                           href="{{ url_for('vista_stats') }}">
                            <i class="bi bi-graph-up-arrow"></i> Estadísticas
                        </a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <div class="d-flex align-items-center h-100">
                            <span class="endpoint-badge" style="font-size: 0.65rem; border-radius: 4px; padding: 2px 8px;">
                                <i class="bi bi-broadcast me-1"></i> LIVE STREAM
                            </span>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer style="margin-top: 4rem; padding-bottom: 2rem; border-top: 1px solid var(--border); padding-top: 2rem;">
        <div class="container text-center">
            <p style="font-family: 'Space Mono', monospace; font-size: 0.75rem; color: var(--text-muted);">
                ONYX GLASS INTERFACE &bull; <span style="color: var(--accent);">REAL-TIME HEART INTELLIGENCE</span>
            </p>
            <div class="d-flex justify-content-center gap-3 mt-3" style="font-size: 1.2rem; color: var(--accent-dim);">
                <i class="bi bi-cpu"></i>
                <i class="bi bi-database"></i>
                <i class="bi bi-cloud-check"></i>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}

</body>
</html>
